<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women Who Hack | Home</title>
    <style>
        :root {
            --baby-pink: #f4c2c2;
            --cream: #fffdd0;
            --pure-white: #ffffff;
            --dark-pink: #ff91a4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--cream);
            background-image: url('https://www.transparenttextures.com/patterns/pink-dust.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow-x: hidden;
        }
        header {
            background-color: var(--pure-white);
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--baby-pink);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        nav { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 5px; }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: var(--dark-pink);
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        nav a:hover { color: #ffb6c1; }
        nav a.auth-btn {
            background: var(--baby-pink);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
        }
        nav a.logout-btn {
            background: #FCE4EC;
            color: #D81B60;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            border: 2px solid #F8BBD0;
            display: none;
        }
        .user-greeting {
            font-size: 0.85rem;
            color: #D81B60;
            font-weight: 600;
            display: none;
            margin: 0 10px;
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: 4rem; color: var(--dark-pink); margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        .hero p { font-size: 1.5rem; max-width: 600px; background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 20px; }
        .bow-icon { font-size: 3rem; color: var(--baby-pink); margin: 20px 0; }
        .btn { background-color: var(--baby-pink); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-size: 1.2rem; font-weight: bold; transition: transform 0.3s, box-shadow 0.3s; border: 2px solid var(--pure-white); margin-top: 20px; display: inline-block; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--baby-pink); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        footer { text-align: center; padding: 20px; font-size: 0.9rem; color: var(--dark-pink); }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">בית</a>
            <a href="/about">המייסדת</a>
            <a href="/attacks">מתקפות </a>
            <a href="/learn">למידה</a>
            <a href="/mysteries">תעלומות</a>
            <a href="/projects">פרויקטים</a>
            <a href="/blog">בלוג</a>
            <a href="/Profile">הפרופיל שלי</a>
            <a href="/contact">צור קשר</a>
            <!-- ✅ מוצג לפי מצב התחברות -->
            <span class="user-greeting" id="user-greeting"></span>
            <a href="/register" class="auth-btn" id="btn-register">הרשמה 🎀</a>
            <a href="/login" class="auth-btn" id="btn-login">כניסה</a>
            <button class="logout-btn" id="btn-logout" onclick="doLogout()">יציאה ←</button>
        </nav>
    </header>

    <div class="hero">
        <div class="bow-icon">🎀</div>
        <h1>Women Who Hack</h1>
        <p>ברוכות הבאות לקהילת ההאקריות הכי חזקה (והכי יפה) ברשת. כאן תלמדי הכל על סייבר, הגנה וקוד – בסטייל שלך.</p>
        <a href="/register" class="btn" id="cta-btn">הצטרפי לנבחרת 🎀</a>
    </div>

    <footer>&copy; 2026 Women Who Hack | Made with 🎀 by Mayyan</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyC-k44JqPI_wYvUwwqDsq4mdB1HAinJE4o",
            authDomain: "women-who-hack-40840.firebaseapp.com",
            projectId: "women-who-hack-40840",
            storageBucket: "women-who-hack-40840.firebasestorage.app",
            messagingSenderId: "180448551855",
            appId: "1:180448551855:web:5a05c8deb44fcc2f7f055a"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // ✅ מחוברת — הצג שם ממש מ-Firestore לפי UID
                const snap = await getDoc(doc(db, "users", user.uid));
                const name = snap.exists() ? snap.data().nameHeb : '';

                document.getElementById('btn-register').style.display = 'none';
                document.getElementById('btn-login').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'inline-block';
                if (name) {
                    const g = document.getElementById('user-greeting');
                    g.textContent = `היי ${name} 🎀`;
                    g.style.display = 'inline';
                }
                document.getElementById('cta-btn').textContent = 'לפרופיל שלי 🎀';
                document.getElementById('cta-btn').href = '/Profile';
            } else {
                // לא מחוברת — הצג כפתורי הרשמה/כניסה
                document.getElementById('btn-register').style.display = 'inline-block';
                document.getElementById('btn-login').style.display = 'inline-block';
                document.getElementById('btn-logout').style.display = 'none';
            }
        });

        window.doLogout = async function() {
            await signOut(auth);
            window.location.reload();
        };
    </script>
</body>
</html>
